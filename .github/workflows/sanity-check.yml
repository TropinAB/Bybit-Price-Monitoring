name: Sanity Check

on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:

jobs:
  sanity_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      - name: Install dependencies
        run: npm ci
      - name: Lint check
        run: npm run lint:check
      - name: TypeScript Type Check
        run: npx tsc --noEmit --strict --noUnusedLocals --noUnusedParameters --pretty
      - name: Run tests
        run: npm run test
      - name: Build project
        run: npm run build
